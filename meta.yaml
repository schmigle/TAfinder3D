{% set name = "tafinder3d" %}
{% set version = "1.0.6" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  path: .
  exclude:
    - conda-bld
    - .git
    - __pycache__
    - "*.pyc"
    - .pytest_cache
    - "*.egg-info"

build:
  number: 0
  noarch: python
  script:
    - python setup.py install --single-version-externally-managed --record=record.txt
    - mkdir -p $PREFIX/share/tafinder3d
    - cp -r tafinder_db $PREFIX/share/tafinder3d/
  entry_points:
    - tafinder = tafinder:main

requirements:
  host:
    - python =3.12
    - setuptools
    - pip
  run:
    - python=3.12
    - numpy=2.3.4
    - pandas=2.3.3
    - mmseqs2
    - hmmer=3.4
    - prodigal=2.6.3
    - prodigal-gv=2.11.0
    - foldseek
    - pip

about:
  home: https://github.com/schmigle/TAfinder3D
  license: MIT
  summary: 'Toxin-antitoxin system identification with 3D structure-based searching'
  description: |
    TAfinder3D identifies Types I-VIII toxin-antitoxin loci in bacterial genomes
    using sequence homology (MMseqs2), domain detection (HMMER), and 3D
    structure-based searching (Foldseek with GPU acceleration).

extra:
  recipe-maintainers:
    - schmigle
